<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 105" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="45%" stop-color="#C9A030"/>
      <stop offset="100%" stop-color="#8B6518"/>
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="52" cy="52" r="48" stroke="url(#gold)" stroke-width="2.5" fill="none"/>

  <!-- P icon: vertical stem -->
  <line x1="30" y1="24" x2="30" y2="80" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>

  <!-- P bowl: 3 concentric arcs (outermost → innermost) -->
  <path d="M30 24 A28 28 0 0 1 30 80" stroke="url(#gold)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M30 34 A18 18 0 0 1 30 70" stroke="url(#gold)" stroke-width="4"   fill="none" stroke-linecap="round"/>
  <path d="M30 44 A8  8  0 0 1 30 60" stroke="url(#gold)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- PURPLESOFT text -->
  <text
    x="114" y="68"
    font-family="Arial Black, Arial, sans-serif"
    font-size="42"
    font-weight="900"
    letter-spacing="2"
    fill="url(#gold)"
  >PURPLESOFT</text>
</svg>
